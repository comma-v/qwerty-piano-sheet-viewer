<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI Cursor Player</title>
    <script src="https://unpkg.com/tone"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        :root {
            --bg: #0f1115;
            --text: #e7e9ee;
            --panel: #171a21;
            --border: #6d7480;
            --note-bg: #222733;
            --note-text: #f2f5ff;
            --note-hit: #2f3e2f;
            --note-hit-border: #7edb8a;
            --cursor: #ff5a5f;
            --accent: #8aa4ff;
            --sheet-width: 760px;
            --sheet-height: 320px;
            --inner-width: 640px;
            --scrollbar-w: 14px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 72px 56px 40px;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background: var(--bg);
            text-align: center;
        }

        .app {
            max-width: 760px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 28px;
            font-weight: 700;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        input[type="file"], button {
            font-size: 14px;
        }

        input[type="file"], button {
            color: var(--text);
            background: #222734;
            border: 1px solid #3a4150;
            border-radius: 8px;
            padding: 8px 12px;
        }

        button:disabled {
            opacity: 0.45;
        }

        #status {
            min-height: 22px;
            margin: 10px 0 18px;
            font-size: 14px;
        }

        .viewer {
            display: flex;
            align-items: stretch;
            gap: 10px;
            justify-content: center;
        }

        #sheetWrap {
            width: 100%;
            height: var(--sheet-height);
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            background: var(--panel);
            border: 1px solid #2a3040;
            border-radius: 12px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #sheetWrap::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        #sheet {
            width: 240px;
            min-height: var(--sheet-height);
            margin: 0 auto;
            position: relative;
        }

        .note {
            position: absolute;
            min-width: 34px;
            padding: 6px 8px;
            background: var(--note-bg);
            color: var(--note-text);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.25;
            text-align: center;
            white-space: pre-line;
            user-select: none;
            transform: translate(-50%, -50%);
        }

        .note.hit {
            background: var(--note-hit);
            border-color: var(--note-hit-border);
        }

        #cursor {
            position: absolute;
            bottom: 18px;
            left: 0;
            z-index: 10;
            display: none;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, rgba(255, 90, 95, 0.15), var(--cursor), rgba(255, 90, 95, 0.15));
            transform: translate3d(0, 0, 0);
            transform-origin: left center;
            pointer-events: none;
            will-change: transform;
            box-shadow: 0 0 8px rgba(255, 90, 95, 0.35);
        }

        .scrollbar {
            display: none;
        }

        .scrollbar__thumb {
            position: absolute;
            left: 0;
            width: 100%;
            min-height: 36px;
            background: #394155;
            border: 1px solid #596275;
            cursor: grab;
        }

        .scrollbar__thumb:active {
            cursor: grabbing;
        }
    </style>
</head>

<body>
    <div class="app">
        <h1>🎹 MIDI Cursor Player</h1>

        <div class="controls">
            <input type="file" id="fileInput" accept=".mid,.midi" />
            <button id="playBtn" disabled>▶ 재생</button>
            <button id="stopBtn" disabled>■ 정지</button>
        </div>

        <div id="status">MIDI 파일을 선택하세요.</div>

        <div class="viewer">
            <div id="sheetWrap">
                <div id="sheet">
                    <div id="cursor"></div>
                </div>
            </div>

            <div class="scrollbar" id="scrollbar">
                <div class="scrollbar__thumb" id="scrollThumb"></div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const sheet = document.getElementById('sheet');
        const sheetWrap = document.getElementById('sheetWrap');
        const cursor = document.getElementById('cursor');
        const scrollbar = document.getElementById('scrollbar');
        const scrollThumb = document.getElementById('scrollThumb');

        const stackHeight = 32;
        const maxStack = 6;
        const groupGapMs = 30;
        const pixelsPerMs = 0.18;
        const notePadding = 50;
        const judgmentOffset = 18;

        let currentMidi = null;
        let noteGroups = [];
        let renderedNotes = [];
        let animationId = null;
        let playStartAt = 0;
        let isPlaying = false;
        let nextGroupIndex = 0;

        let synth = null;

        function initSampler() {
            synth = new Tone.Sampler({
                urls: {
                    A0: 'A0.mp3', C1: 'C1.mp3', 'D#1': 'Ds1.mp3', 'F#1': 'Fs1.mp3',
                    A1: 'A1.mp3', C2: 'C2.mp3', 'D#2': 'Ds2.mp3', 'F#2': 'Fs2.mp3',
                    A2: 'A2.mp3', C3: 'C3.mp3', 'D#3': 'Ds3.mp3', 'F#3': 'Fs3.mp3',
                    A3: 'A3.mp3', C4: 'C4.mp3', 'D#4': 'Ds4.mp3', 'F#4': 'Fs4.mp3',
                    A4: 'A4.mp3', C5: 'C5.mp3', 'D#5': 'Ds5.mp3', 'F#5': 'Fs5.mp3',
                    A5: 'A5.mp3', C6: 'C6.mp3', 'D#6': 'Ds6.mp3', 'F#6': 'Fs6.mp3',
                    A6: 'A6.mp3', C7: 'C7.mp3', 'D#7': 'Ds7.mp3', 'F#7': 'Fs7.mp3',
                    A7: 'A7.mp3', C8: 'C8.mp3'
                },
                release: 4,
                baseUrl: 'https://tonejs.github.io/audio/salamander/',
                onload: () => {
                    status.textContent = '✅ 샘플 로딩 완료! MIDI 파일을 선택하세요.';
                }
            }).toDestination();
        }

        initSampler();

        function setKeyMap() {
            const keyMap = new Map();
            const keyArray = [
                '1', '!', '2', '@', '3', '4', '$', '5', '%', '6', '^',
                '7', '8', '*', '9', '(', '0',
                'q', 'Q', 'w', 'W', 'e', 'E', 'r', 't', 'T', 'y', 'Y',
                'u', 'i', 'I', 'o', 'O', 'p', 'P',
                'a', 's', 'S', 'd', 'D', 'f', 'g', 'G', 'h', 'H',
                'j', 'J', 'k', 'l', 'L',
                'z', 'Z', 'x', 'c', 'C', 'v', 'V', 'b', 'B', 'n', 'm', 'M'
            ];

            for (let i = 0; i < keyArray.length; i++) {
                keyMap.set(i + 36, keyArray[i]);
            }
            return keyMap;
        }

        const keyMap = setKeyMap();

        function getLastTimeMs(midi) {
            let maxTime = 0;
            midi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    const endTime = (note.time + note.duration) * 1000;
                    if (endTime > maxTime) maxTime = endTime;
                });
            });
            return maxTime;
        }

        function collectNotes(midi) {
            const allNotes = [];

            midi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    const keyChar = keyMap.get(note.midi);
                    if (!keyChar) return;

                    allNotes.push({
                        midi: note.midi,
                        keyChar,
                        timeMs: note.time * 1000,
                        durationMs: note.duration * 1000,
                        noteName: note.name
                    });
                });
            });

            allNotes.sort((a, b) => a.timeMs - b.timeMs);
            return allNotes;
        }

        function groupNotesBy30ms(allNotes) {
            if (allNotes.length === 0) return [];

            const groups = [];
            let currentGroup = [allNotes[0]];
            let groupStartTime = allNotes[0].timeMs;

            for (let i = 1; i < allNotes.length; i++) {
                const note = allNotes[i];

                if (note.timeMs - groupStartTime <= groupGapMs) {
                    currentGroup.push(note);
                } else {
                    groups.push({ timeMs: currentGroup[0].timeMs, notes: currentGroup });
                    currentGroup = [note];
                    groupStartTime = note.timeMs;
                }
            }

            groups.push({ timeMs: currentGroup[0].timeMs, notes: currentGroup });
            return groups;
        }

        function clearSheet() {
            sheet.querySelectorAll('.note').forEach(el => el.remove());
            cursor.style.display = 'none';
            renderedNotes = [];
            sheet.style.width = '240px';
            sheet.style.height = '320px';
        }

        function getJudgmentY() {
            return sheetWrap.clientHeight - judgmentOffset;
        }

        function createNote(char, scaledTime, stackIndex) {
            const noteEl = document.createElement('div');
            noteEl.className = 'note';
            noteEl.textContent = char;

            const x = 28 + stackIndex * 56;
            const y = getJudgmentY() - scaledTime;

            noteEl.style.left = `${x}px`;
            noteEl.style.top = `${y}px`;
            noteEl.style.transform = 'translate(-50%, -50%)';

            sheet.appendChild(noteEl);
            return { element: noteEl, x, y, row: 0 };
        }

        function renderGroups(groups) {
            clearSheet();
            sheet.style.height = `${sheetWrap.clientHeight}px`;

            groups.forEach(group => {
                const scaledTime = group.timeMs * pixelsPerMs;

                group.notes.forEach((note, index) => {
                    const stackIndex = Math.min(index, maxStack - 1);
                    const rendered = createNote(note.keyChar, scaledTime, stackIndex);
                    note.element = rendered.element;
                    note.x = rendered.x;
                    note.y = rendered.y;
                    note.row = rendered.row;
                    renderedNotes.push(note);
                });
            });
        }

        function getCursorPosition(elapsedMs) {
            const scaledTime = elapsedMs * pixelsPerMs;
            return { x: 0, y: getJudgmentY() - scaledTime, row: 0 };
        }

        function playGroup(group) {
            const noteNames = group.notes.map(n => n.noteName);
            const longest = Math.max(...group.notes.map(n => Math.max(120, n.durationMs)));
            synth.triggerAttackRelease(noteNames, longest / 1000);

            group.notes.forEach(note => {
                if (note.element) {
                    note.element.classList.add('hit');
                    setTimeout(() => note.element.classList.remove('hit'), 180);
                }
            });
        }

        function stopPlayback() {
            if (animationId) cancelAnimationFrame(animationId);
            animationId = null;
            isPlaying = false;
            nextGroupIndex = 0;
            cursor.style.display = 'none';
            playBtn.disabled = !currentMidi;
            stopBtn.disabled = true;
        }

        function updatePlayback() {
            if (!isPlaying) return;

            const elapsedMs = performance.now() - playStartAt;
            const travelPx = elapsedMs * pixelsPerMs;

            cursor.style.display = 'block';

            renderedNotes.forEach(note => {
                if (!note.element) return;
                const y = getJudgmentY() - (note.timeMs * pixelsPerMs) + travelPx;
                note.element.style.transform = `translate(-50%, -50%) translateY(${travelPx}px)`;
                note.element.style.top = `${getJudgmentY() - (note.timeMs * pixelsPerMs)}px`;
                note.element.style.left = `${note.element.style.left}`;
                note.element.dataset.y = String(y);
            });

            while (nextGroupIndex < noteGroups.length && elapsedMs >= noteGroups[nextGroupIndex].timeMs) {
                playGroup(noteGroups[nextGroupIndex]);
                nextGroupIndex++;
            }

            const lastTimeMs = getLastTimeMs(currentMidi);
            if (elapsedMs >= lastTimeMs + 500) {
                stopPlayback();
                status.textContent = '재생 완료';
                return;
            }

            animationId = requestAnimationFrame(updatePlayback);
        }

        async function startPlayback() {
            if (!currentMidi || noteGroups.length === 0) return;

            await Tone.start();
            stopPlayback();

            isPlaying = true;
            nextGroupIndex = 0;
            playStartAt = performance.now();
            playBtn.disabled = true;
            stopBtn.disabled = false;
            status.textContent = '재생 중... 커서가 닿는 노트를 동시에 재생합니다.';

            updatePlayback();
        }

        fileInput.addEventListener('change', async e => {
            const file = e.target.files[0];
            if (!file) return;

            stopPlayback();
            status.textContent = 'MIDI 로딩 중...';

            const arrayBuffer = await file.arrayBuffer();
            currentMidi = new Midi(arrayBuffer);

            const allNotes = collectNotes(currentMidi);
            noteGroups = groupNotesBy30ms(allNotes);
            renderGroups(noteGroups);

            playBtn.disabled = noteGroups.length === 0;
            stopBtn.disabled = true;

            const sec = (getLastTimeMs(currentMidi) / 1000).toFixed(2);
            status.textContent = `로딩 완료 | 그룹 ${noteGroups.length}개 | 길이 ${sec}초`;
        });

        playBtn.addEventListener('click', startPlayback);
        stopBtn.addEventListener('click', () => {
            stopPlayback();
            status.textContent = '정지됨';
        });
    </script>
</body>

</html>
