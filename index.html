<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White MIDI Stepper - Case Sensitive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f8fafc;
            font-family: 'Pretendard', sans-serif;
            color: #1e293b;
        }

        canvas {
            display: block;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .controls-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            max-width: 95vw;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px 24px 0 0;
            pointer-events: auto;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-bottom: none;
            backdrop-filter: blur(20px);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        .controls-container.collapsed {
            transform: translateX(-50%) translateY(calc(100% - 60px));
        }

        .toggle-btn {
            width: 40px;
            height: 24px;
            background: #f1f5f9;
            border-radius: 12px;
            margin: 8px auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-icon {
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 6px solid #94a3b8;
            transition: transform 0.3s;
        }

        .collapsed .toggle-icon {
            transform: rotate(180deg);
        }

        .judgment-text {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            font-size: 2.5rem;
            font-weight: 900;
            opacity: 0;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            pointer-events: none;
            z-index: 30;
            font-style: italic;
        }

        .judgment-text.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

    </style>
</head>

<body>

    <div id="overlay">
        <div id="judgment" class="judgment-text">PERFECT</div>

        <div id="controls-panel" class="controls-container">
            <div class="toggle-btn" id="panel-toggle">
                <div class="toggle-icon"></div>
            </div>
            <div class="px-8 pb-8">
                <div class="flex justify-between items-center h-[28px] mb-6">
                    <div class="flex items-center gap-4">
                        <h2 class="text-sm font-black tracking-tight text-slate-900 italic">CASE SENSITIVE STEPPER</h2>
                        <div id="transpose-val"
                            class="text-[10px] bg-slate-100 px-3 py-1 rounded-full font-bold text-slate-500">TRP +0
                        </div>
                    </div>
                    <div class="flex gap-8 items-center">
                        <div class="flex items-baseline gap-2">
                            <span class="text-[9px] text-slate-400 font-bold uppercase">Score</span>
                            <span id="score-val" class="text-xl font-black tabular-nums text-slate-900">0</span>
                        </div>
                        <div class="flex items-baseline gap-2">
                            <span class="text-[9px] text-slate-400 font-bold uppercase">Combo</span>
                            <span id="combo-val" class="text-xl font-black text-indigo-600 tabular-nums">0</span>
                        </div>
                    </div>
                </div>

                <div id="expanded-content" class="space-y-6">
                    <div class="grid grid-cols-2 gap-6 items-end">
                        <div class="space-y-2">
                            <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">MIDI
                                Library</label>
                            <input type="file" id="midi-upload" accept=".mid,.midi" class="block w-full text-[10px] text-slate-500
                                file:mr-2 file:py-2 file:px-3 file:rounded-xl file:border-0
                                file:text-[10px] file:font-bold file:bg-slate-100 file:text-slate-700
                                hover:file:bg-slate-200 cursor-pointer" />
                            <div id="status" class="text-[10px] font-bold text-indigo-500 uppercase tracking-tighter">
                                WAITING FOR SYSTEM...</div>
                        </div>
                        <div class="flex gap-2">
                            <button id="play-btn" disabled
                                class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black text-xs hover:bg-indigo-600 transition-all shadow-lg active:scale-95 disabled:opacity-20">START
                                SESSION</button>
                            <button id="stop-btn"
                                class="px-6 bg-slate-100 text-slate-400 py-4 rounded-2xl font-black text-xs hover:text-slate-900 transition-colors">■</button>
                        </div>
                    </div>

                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between items-center">
                        <div class="space-y-1">
                            <p class="text-[9px] text-slate-500 font-bold uppercase">Mapping Info</p>
                            <p class="text-[10px] text-slate-400 leading-tight">Case Sensitive: 'a' and 'A' are
                                different. SPACE for auto-step.</p>
                        </div>
                        <div class="flex gap-1">
                            <div
                                class="px-3 h-6 rounded bg-white border border-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-400">
                                SHIFT + KEY</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');
        const midiUpload = document.getElementById('midi-upload');
        const scoreVal = document.getElementById('score-val');
        const comboVal = document.getElementById('combo-val');
        const judgmentEl = document.getElementById('judgment');
        const transposeEl = document.getElementById('transpose-val');
        const controlsPanel = document.getElementById('controls-panel');
        const panelToggle = document.getElementById('panel-toggle');

        let synth;
        let midiData = null;
        let isPlaying = false;
        let gameTime = 0;
        let lastTimestamp = 0;
        let notes = [];
        let displayGroups = [];
        let particles = [];
        let score = 0;
        let combo = 0;
        let isWaiting = false;
        let transpose = 0;
        let lastProcessedNoteTime = -1;

        const HIT_X = 240;
        const SPEED = 450;
        const LANE_HEIGHT = 100;
        const OFFSET_Y = 120;
        const COLORS = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6'];

        // Java key mapping 그대로 적용
        const keyArray = [
            "1", "!", "2", "@", "3", "4", "$", "5", "%", "6", "^", "7", "8", "*", "9", "(",
            "0", "q", "Q", "w", "W", "e", "E", "r", "t", "T", "y", "Y", "u", "i", "I", "o",
            "O", "p", "P", "a", "s", "S", "d", "D", "f", "g", "G", "h", "H", "j", "J", "k",
            "l", "L", "z", "Z", "x", "c", "C", "v", "V", "b", "B", "n", "m", "M"
        ];

        const KEY_TO_MIDI = {};
        const MIDI_TO_KEY = {};

        for (let i = 0; i < keyArray.length; i++) {
            const midi = i + 36;
            KEY_TO_MIDI[keyArray[i]] = midi;
            MIDI_TO_KEY[midi] = keyArray[i];
        }

        function getLaneFromMidi(midi) {
            if (midi >= 36 && midi <= 51) return 0;
            if (midi >= 52 && midi <= 67) return 1;
            if (midi >= 68 && midi <= 83) return 2;
            return 3;
        }

        function getNearestMappedMidi(midi) {
            const minMidi = 36;
            const maxMidi = 36 + keyArray.length - 1;
            return Math.max(minMidi, Math.min(maxMidi, midi));
        }

        panelToggle.onclick = () => controlsPanel.classList.toggle('collapsed');

        window.onload = function () {
            if (typeof Tone !== 'undefined') {
                initSampler();
            } else {
                status.textContent = "TONE.JS LOAD FAILED";
            }
            requestAnimationFrame(draw);
        };

        function initSampler() {
            synth = new Tone.Sampler({
                urls: {
                    "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
                    "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
                    "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
                    "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
                    "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
                    "A5": "A5.mp3", "C6": "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3",
                    "A6": "A6.mp3", "C7": "C7.mp3", "D#7": "Ds7.mp3", "F#7": "Fs7.mp3",
                    "A7": "A7.mp3", "C8": "C8.mp3"
                },
                release: 1.5,
                baseUrl: "https://tonejs.github.io/audio/salamander/",
                onload: () => {
                    status.textContent = "READY TO PLAY";
                    playBtn.disabled = false;
                }
            }).toDestination();
        }

        midiUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                const midi = new Midi(event.target.result);
                midiData = midi;
                status.innerHTML = `FILE: ${file.name.slice(0, 20)}...`;
                notes = [];

                midi.tracks.forEach(track => {
                    track.notes.forEach(note => {
                        const mappedMidi = getNearestMappedMidi(note.midi);
                        const mappedKey = MIDI_TO_KEY[mappedMidi] || "?";
                        const lane = getLaneFromMidi(mappedMidi);

                        notes.push({
                            sourceMidi: note.midi,
                            midi: mappedMidi,
                            time: note.time,
                            duration: note.duration,
                            name: note.name,
                            char: mappedKey,
                            lane: lane,
                            active: true
                        });
                    });
                });

                notes.sort((a, b) => a.time - b.time);
                displayGroups = groupNotesForDisplay(notes);
            };
            reader.readAsArrayBuffer(file);
        });

        const GROUP_WINDOW_SEC = 0.03;
        const GROUP_OVERLAP_SEC = 0.03;
        const EARLY_HIT_SEC = 0.15;

        function groupNotesForDisplay(sourceNotes) {
            if (sourceNotes.length === 0) return [];

            const groups = [];
            let currentGroup = [sourceNotes[0]];
            let groupStartTime = sourceNotes[0].time;

            for (let i = 1; i < sourceNotes.length; i++) {
                const note = sourceNotes[i];
                const sameTime = Math.abs(note.time - groupStartTime) < GROUP_WINDOW_SEC;
                const sameGroupKey = note.char === currentGroup[currentGroup.length - 1].char;
                if (sameTime || sameGroupKey || Math.abs(note.time - currentGroup[currentGroup.length - 1].time) < GROUP_OVERLAP_SEC) {
                    currentGroup.push(note);
                } else {
                    groups.push({ time: groupStartTime, notes: currentGroup });
                    currentGroup = [note];
                    groupStartTime = note.time;
                }
            }

            groups.push({ time: groupStartTime, notes: currentGroup });
            return groups;
        }

        function getKeyRow(key) {
            const index = keyArray.indexOf(key);
            if (index <= 16) return 0;
            if (index <= 35) return 1;
            if (index <= 49) return 2;
            return 3;
        }

        function getKeyOrderInRow(key) {
            const index = keyArray.indexOf(key);
            if (index <= 16) return index;
            if (index <= 35) return index - 17;
            if (index <= 49) return index - 36;
            return index - 50;
        }

        function displayKeyChar(char) {
            return char === '0' ? 'θ' : char;
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function showJudgment(text, color) {
            judgmentEl.innerText = text;
            judgmentEl.style.color = color;
            judgmentEl.classList.remove('show');
            void judgmentEl.offsetWidth;
            judgmentEl.classList.add('show');
            setTimeout(() => judgmentEl.classList.remove('show'), 400);
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x,
                    y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1.0,
                    size: Math.random() * 3 + 2,
                    color
                });
            }
        }

        function playMappedKeySound(key) {
            const midi = KEY_TO_MIDI[key];
            if (midi === undefined) return;

            const noteName = Tone.Frequency(midi + transpose, 'midi').toNote();
            synth.triggerAttackRelease(noteName, '8n');
        }

        function triggerNote(note) {
            note.active = false;
            score += 1000 + (combo * 10);
            combo++;

            createParticles(HIT_X, (note.lane) * LANE_HEIGHT + OFFSET_Y + 50, COLORS[note.lane]);

            const transposedMidi = Tone.Frequency(note.midi + transpose, "midi").toNote();
            synth.triggerAttackRelease(transposedMidi, "8n");

            isWaiting = false;
            updateUI();
        }

        function getActiveGroupHeadTime() {
            const candidates = notes
                .filter(n => n.active && n.time >= gameTime - EARLY_HIT_SEC && n.time <= gameTime + GROUP_WINDOW_SEC)
                .sort((a, b) => a.time - b.time || getKeyRow(a.char) - getKeyRow(b.char) || getKeyOrderInRow(a.char) - getKeyOrderInRow(b.char));

            return candidates.length ? candidates[0].time : null;
        }

        function processSingleStep() {
            if (!isPlaying) return;

            const candidates = notes
                .filter(n => n.active && Math.abs(gameTime - n.time) < 0.4)
                .sort((a, b) => a.time - b.time);

            if (candidates.length > 0) {
                const headTime = candidates[0].time;
                if (headTime === lastProcessedNoteTime) return;

                const group = candidates.filter(n => Math.abs(n.time - headTime) < 0.03);
                group.forEach(n => triggerNote(n));
                lastProcessedNoteTime = headTime;
                showJudgment("PERFECT STEP", "#6366f1");
            }
        }

        function getRequiredNote() {
            const headTime = getActiveGroupHeadTime();
            if (headTime === null) return [];

            const candidates = notes
                .filter(n => n.active && Math.abs(n.time - headTime) < GROUP_WINDOW_SEC)
                .sort((a, b) => a.time - b.time || getKeyRow(a.char) - getKeyRow(b.char) || getKeyOrderInRow(a.char) - getKeyOrderInRow(b.char));

            if (candidates.length === 0) return [];

            return candidates;
        }

        function processManualKey(key) {
            if (!isPlaying) return;

            const pressedMidi = KEY_TO_MIDI[key];
            if (pressedMidi === undefined) return;

            const requiredGroup = getRequiredNote();
            if (requiredGroup.length === 0) return;

            const target = requiredGroup.find(n => n.active && n.midi === pressedMidi);

            if (target) {
                triggerNote(target);
                showJudgment("ACCURATE", "#1e293b");
            }
        }

        function updateUI() {
            scoreVal.innerText = score.toLocaleString();
            comboVal.innerText = combo;
        }

        function draw(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const deltaTime = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;

            if (isPlaying && !isWaiting) {
                gameTime += deltaTime;
            }

            if (isPlaying && !isWaiting) {
                const next = notes.find(n => n.active && n.time <= gameTime + 0.005);
                if (next) {
                    isWaiting = true;
                    gameTime = next.time;
                }
            }

            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'chartreuse';
            ctx.fillRect(20, 120, 190, 540);
            ctx.strokeStyle = '#111111';
            ctx.lineWidth = 2;
            ctx.strokeRect(20, 120, 190, 540);

            ctx.strokeStyle = 'chartreuse';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(HIT_X, 120);
            ctx.lineTo(HIT_X, 660);
            ctx.stroke();

            const rowY = canvas.height * 0.38;
            displayGroups.forEach(group => {
                const groupNotes = group.notes.filter(n => n.active);
                if (groupNotes.length === 0) return;

                const groupX = HIT_X + (group.time - gameTime) * SPEED;
                const rows = [[], [], [], []];
                groupNotes.forEach(note => {
                    rows[getKeyRow(note.char)].push(note);
                });
                rows.forEach(row => row.sort((a, b) => getKeyOrderInRow(a.char) - getKeyOrderInRow(b.char)));

                const widestRow = Math.max(...rows.map(row => row.length), 1);
                const letterStep = 21;
                const boxWidth = Math.max(160, (24 + widestRow * letterStep) * 4);
                const boxHeight = Math.max(144, (16 + 4 * 16) * 4);

                if (groupX + boxWidth < 0 || groupX > canvas.width + 80) return;

                ctx.fillStyle = 'rgba(127, 255, 0, 0.00)';
                ctx.strokeStyle = '#111111';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.rect(groupX, rowY, boxWidth, boxHeight);
                ctx.fill();
                ctx.stroke();

                ctx.font = 'bold 30px monospace';
                ctx.textAlign = 'left';

                rows.forEach((row, rowIdx) => {
                    row.forEach((note, idx) => {
                        const textX = groupX + 8 + (idx * letterStep);
                        const textY = rowY + 44 + (rowIdx * 42);
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = '#111111';
                        ctx.strokeText(displayKeyChar(note.char), textX, textY);
                        ctx.fillStyle = '#111111';
                        ctx.fillText(displayKeyChar(note.char), textX, textY);
                    });
                });
            });

            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.04;
            });

            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1.0;

            requestAnimationFrame(draw);
        }

        playBtn.onclick = async () => {
            if (!midiData) return;
            await Tone.start();
            score = 0;
            combo = 0;
            gameTime = 0;
            lastProcessedNoteTime = -1;
            notes.forEach(n => n.active = true);
            isPlaying = true;
            isWaiting = false;
            status.innerHTML = "ACTIVE SESSION";
            updateUI();
            controlsPanel.classList.add('collapsed');
        };

        stopBtn.onclick = () => {
            isPlaying = false;
            status.innerHTML = "STOPPED";
            controlsPanel.classList.remove('collapsed');
        };

        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;

            if (e.key === 'ArrowRight') {
                transpose++;
                transposeEl.innerText = `TRP ${transpose >= 0 ? '+' : ''}${transpose}`;
                return;
            }

            if (e.key === 'ArrowLeft') {
                transpose--;
                transposeEl.innerText = `TRP ${transpose >= 0 ? '+' : ''}${transpose}`;
                return;
            }

            if (e.code === 'Space') {
                e.preventDefault();
                processSingleStep();
            } else {
                playMappedKeySound(e.key);
                processManualKey(e.key);
            }
        });
    </script>
</body>

</html>
