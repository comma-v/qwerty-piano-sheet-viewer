<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI Cursor Player</title>
    <script src="https://unpkg.com/tone"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        :root {
            --bg: #0f1115;
            --text: #e7e9ee;
            --panel: #171a21;
            --border: #6d7480;
            --note-bg: #222733;
            --note-text: #f2f5ff;
            --note-hit: #2f3e2f;
            --note-hit-border: #7edb8a;
            --cursor: #ff5a5f;
            --accent: #8aa4ff;
            --sheet-width: 760px;
            --sheet-height: 640px;
            --inner-width: 640px;
            --scrollbar-w: 14px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 72px 56px 40px;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background: var(--bg);
            text-align: center;
        }

        .app {
            max-width: 760px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 28px;
            font-weight: 700;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        input[type="file"], select, button {
            font-size: 14px;
        }

        input[type="file"], select, button {
            color: var(--text);
            background: #222734;
            border: 1px solid #3a4150;
            border-radius: 8px;
            padding: 8px 12px;
        }

        button:disabled {
            opacity: 0.45;
        }

        #status {
            min-height: 22px;
            margin: 10px 0 18px;
            font-size: 14px;
        }

        .viewer {
            display: flex;
            align-items: stretch;
            gap: 10px;
            justify-content: center;
        }

        #sheetWrap {
            width: 100%;
            height: var(--sheet-height);
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            background: var(--panel);
            border: 1px solid #2a3040;
            border-radius: 12px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #sheetWrap::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        #sheet {
            width: 240px;
            min-height: var(--sheet-height);
            margin: 0 auto;
            position: relative;
        }

        .note {
            position: absolute;
            min-width: 34px;
            padding: 6px 8px;
            background: var(--note-bg);
            color: var(--note-text);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.25;
            text-align: center;
            white-space: pre-line;
            user-select: none;
            transform: translate(-50%, -50%);
        }

        .note.hit {
            background: var(--note-hit);
            border-color: var(--note-hit-border);
        }

        .note.miss {
            opacity: 0.28;
        }

        #cursor {
            position: absolute;
            bottom: 18px;
            left: 0;
            z-index: 10;
            display: block;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, rgba(255, 90, 95, 0.05), var(--cursor), rgba(255, 90, 95, 0.05));
            transform: translate3d(0, 0, 0);
            transform-origin: left center;
            pointer-events: none;
            will-change: transform;
            box-shadow: 0 0 12px rgba(255, 90, 95, 0.5);
        }

        #cursor.flash {
            background: linear-gradient(to right, rgba(126, 219, 138, 0.12), #7edb8a, rgba(126, 219, 138, 0.12));
            box-shadow: 0 0 18px rgba(126, 219, 138, 0.9), 0 0 32px rgba(126, 219, 138, 0.35);
            transform: scaleY(2);
        }

        #judgeLine {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 18px;
            height: 3px;
            z-index: 12;
            pointer-events: none;
            background: linear-gradient(to right, rgba(138, 164, 255, 0.06), #8aa4ff, rgba(255, 90, 95, 0.08));
            box-shadow: 0 0 10px rgba(138, 164, 255, 0.35);
        }

        .scrollbar {
            display: none;
        }

        .scrollbar__thumb {
            position: absolute;
            left: 0;
            width: 100%;
            min-height: 36px;
            background: #394155;
            border: 1px solid #596275;
            cursor: grab;
        }

        .scrollbar__thumb:active {
            cursor: grabbing;
        }
    </style>
</head>

<body>
    <div class="app">
        <h1>🎹 MIDI Cursor Player</h1>

        <div class="controls">
            <input type="file" id="fileInput" accept=".mid,.midi" />
            <select id="projectMidiSelect" aria-label="프로젝트 MIDI 선택">
                <option value="test1.mid">test1.mid</option>
                <option value="test2.mid">test2.mid</option>
                <option value="test3.mid">test3.mid</option>
            </select>
            <button id="loadProjectBtn">프로젝트 불러오기</button>
            <button id="playBtn" disabled>▶ 재생</button>
            <button id="stopBtn" disabled>■ 정지</button>
        </div>

        <div id="status">MIDI 파일을 선택하세요.</div>

        <div class="viewer">
            <div id="sheetWrap">
                <div id="sheet">
                </div>
                <div id="cursor"></div>
            </div>

            <div class="scrollbar" id="scrollbar">
                <div class="scrollbar__thumb" id="scrollThumb"></div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const projectMidiSelect = document.getElementById('projectMidiSelect');
        const loadProjectBtn = document.getElementById('loadProjectBtn');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const sheet = document.getElementById('sheet');
        const sheetWrap = document.getElementById('sheetWrap');
        const cursor = document.getElementById('cursor');
        const scrollbar = document.getElementById('scrollbar');
        const scrollThumb = document.getElementById('scrollThumb');

        const groupGapMs = 30;
        const pixelsPerMs = 0.14;
        const notePadding = 50;
        const judgmentOffset = 18;
        const judgeTolerancePx = 8;

        let currentMidi = null;
        let noteGroups = [];
        let noteQueue = [];
        let animationId = null;
        let playStartAt = 0;
        let pausedMs = 0;
        let pauseStartedAt = 0;
        let isPlaying = false;
        let isPaused = false;
        let nextNoteIndex = 0;
        let activeNotes = [];
        let visualSpeed = 1;
        const visualSpeedStep = 0.1;
        const visualSpeedMin = 0.5;
        const visualSpeedMax = 2.0;
        const chartLeadPx = 220;
        const keyboardWidth = 620;
        const fallDurationMs = 1100;
        const snapDistancePx = 0;
        const judgeHoldMs = 240;
        const startY = -40;
        let feedbackTimer = null;
        let judgeFlashTimer = null;

        const keyboardLayouts = new Map();
        [
            ['1', 0, 0], ['!', 0, 0], ['2', 0, 1], ['@', 0, 1], ['3', 0, 2], ['4', 0, 3],
            ['$', 0, 3], ['5', 0, 4], ['%', 0, 4], ['6', 0, 5], ['^', 0, 5],
            ['7', 0, 6], ['8', 0, 7], ['*', 0, 7], ['9', 0, 8], ['(', 0, 8], ['0', 0, 9],
            ['q', 1, 0], ['Q', 1, 0], ['w', 1, 1], ['W', 1, 1], ['e', 1, 2], ['E', 1, 2],
            ['r', 1, 3], ['t', 1, 4], ['T', 1, 4], ['y', 1, 5], ['Y', 1, 5], ['u', 1, 6],
            ['i', 1, 7], ['I', 1, 7], ['o', 1, 8], ['O', 1, 8], ['p', 1, 9], ['P', 1, 9],
            ['a', 2, 0], ['s', 2, 1], ['S', 2, 1], ['d', 2, 2], ['D', 2, 2], ['f', 2, 3],
            ['g', 2, 4], ['G', 2, 4], ['h', 2, 5], ['H', 2, 5], ['j', 2, 6], ['J', 2, 6],
            ['k', 2, 7], ['l', 2, 8], ['L', 2, 8],
            ['z', 3, 0], ['Z', 3, 0], ['x', 3, 1], ['c', 3, 2], ['C', 3, 2], ['v', 3, 3],
            ['V', 3, 3], ['b', 3, 4], ['B', 3, 4], ['n', 3, 5], ['m', 3, 6], ['M', 3, 6]
        ].forEach(([key, row, col]) => keyboardLayouts.set(key, { row, col }));

        const rowSpecs = [
            { start: 161, step: 42 },
            { start: 161, step: 42 },
            { start: 182, step: 42 },
            { start: 224, step: 42 }
        ];

        let synth = null;

        function initSampler() {
            synth = new Tone.Sampler({
                urls: {
                    A0: 'A0.mp3', C1: 'C1.mp3', 'D#1': 'Ds1.mp3', 'F#1': 'Fs1.mp3',
                    A1: 'A1.mp3', C2: 'C2.mp3', 'D#2': 'Ds2.mp3', 'F#2': 'Fs2.mp3',
                    A2: 'A2.mp3', C3: 'C3.mp3', 'D#3': 'Ds3.mp3', 'F#3': 'Fs3.mp3',
                    A3: 'A3.mp3', C4: 'C4.mp3', 'D#4': 'Ds4.mp3', 'F#4': 'Fs4.mp3',
                    A4: 'A4.mp3', C5: 'C5.mp3', 'D#5': 'Ds5.mp3', 'F#5': 'Fs5.mp3',
                    A5: 'A5.mp3', C6: 'C6.mp3', 'D#6': 'Ds6.mp3', 'F#6': 'Fs6.mp3',
                    A6: 'A6.mp3', C7: 'C7.mp3', 'D#7': 'Ds7.mp3', 'F#7': 'Fs7.mp3',
                    A7: 'A7.mp3', C8: 'C8.mp3'
                },
                release: 4,
                baseUrl: 'https://tonejs.github.io/audio/salamander/',
                onload: () => {
                    status.textContent = '✅ 샘플 로딩 완료! MIDI 파일을 선택하세요.';
                }
            }).toDestination();
        }

        initSampler();

        function setKeyMap() {
            const keyMap = new Map();
            const keyArray = [
                '1', '!', '2', '@', '3', '4', '$', '5', '%', '6', '^',
                '7', '8', '*', '9', '(', '0',
                'q', 'Q', 'w', 'W', 'e', 'E', 'r', 't', 'T', 'y', 'Y',
                'u', 'i', 'I', 'o', 'O', 'p', 'P',
                'a', 's', 'S', 'd', 'D', 'f', 'g', 'G', 'h', 'H',
                'j', 'J', 'k', 'l', 'L',
                'z', 'Z', 'x', 'c', 'C', 'v', 'V', 'b', 'B', 'n', 'm', 'M'
            ];

            for (let i = 0; i < keyArray.length; i++) {
                keyMap.set(i + 36, keyArray[i]);
            }
            return keyMap;
        }

        const keyMap = setKeyMap();

        function getLastTimeMs(midi) {
            let maxTime = 0;
            midi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    const endTime = (note.time + note.duration) * 1000;
                    if (endTime > maxTime) maxTime = endTime;
                });
            });
            return maxTime;
        }

        function collectNotes(midi) {
            const allNotes = [];

            midi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    const keyChar = keyMap.get(note.midi);
                    if (!keyChar) return;

                    allNotes.push({
                        midi: note.midi,
                        keyChar,
                        timeMs: note.time * 1000,
                        durationMs: note.duration * 1000,
                        noteName: note.name
                    });
                });
            });

            allNotes.sort((a, b) => a.timeMs - b.timeMs);
            return allNotes;
        }

        async function loadMidiArrayBuffer(arrayBuffer, sourceName) {
            stopPlayback();
            status.textContent = `MIDI 로딩 중... ${sourceName}`;

            currentMidi = new Midi(arrayBuffer);
            const allNotes = collectNotes(currentMidi);
            noteGroups = groupNotesBy30ms(allNotes);
            renderGroups(noteGroups);

            playBtn.disabled = noteQueue.length === 0;
            stopBtn.disabled = true;

            const sec = (getLastTimeMs(currentMidi) / 1000).toFixed(2);
            status.textContent = `로딩 완료 | ${sourceName} | 노트 ${noteQueue.length}개 | 길이 ${sec}초`;
        }

        async function loadMidiFromUrl(path, label) {
            const resolvedUrl = new URL(path, document.baseURI).href;
            const response = await fetch(resolvedUrl, { cache: 'no-store' });
            if (!response.ok) {
                throw new Error(`Failed to load ${label}`);
            }

            await loadMidiArrayBuffer(await response.arrayBuffer(), label);
        }

        async function loadProjectMidi(path) {
            await loadMidiFromUrl(path, path);
        }

        function groupNotesBy30ms(allNotes) {
            if (allNotes.length === 0) return [];

            const groups = [];
            let currentGroup = [allNotes[0]];
            let groupStartTime = allNotes[0].timeMs;

            for (let i = 1; i < allNotes.length; i++) {
                const note = allNotes[i];

                if (note.timeMs - groupStartTime <= groupGapMs) {
                    currentGroup.push(note);
                } else {
                    groups.push({ timeMs: currentGroup[0].timeMs, notes: currentGroup });
                    currentGroup = [note];
                    groupStartTime = note.timeMs;
                }
            }

            groups.push({ timeMs: currentGroup[0].timeMs, notes: currentGroup });
            return groups;
        }

        function clearSheet() {
            sheet.querySelectorAll('.note').forEach(el => el.remove());
            activeNotes = [];
            sheet.style.width = `${keyboardWidth}px`;
            sheet.style.height = '1280px';
        }

        function getJudgmentY() {
            return sheetWrap.clientHeight - judgmentOffset;
        }

        function createNote(char) {
            const layout = keyboardLayouts.get(char) || { row: 1, col: 0 };
            const noteEl = document.createElement('div');
            noteEl.className = 'note';
            noteEl.textContent = char;

            const spec = rowSpecs[layout.row] || rowSpecs[1];
            const x = spec.start + layout.col * spec.step;
            const y = -40;

            noteEl.style.left = `${x}px`;
            noteEl.style.top = `${y}px`;
            noteEl.style.zIndex = String(20 - layout.row);
            noteEl.style.transform = 'translate(-50%, -50%)';

            sheet.appendChild(noteEl);
            return { element: noteEl, x, y, row: layout.row, col: layout.col };
        }

        function renderGroups(groups) {
            clearSheet();
            sheet.style.height = '1280px';
            noteQueue = [];

            groups.forEach(group => {
                const sortedNotes = [...group.notes].sort((a, b) => {
                    const la = keyboardLayouts.get(a.keyChar) || { row: 1, col: 0 };
                    const lb = keyboardLayouts.get(b.keyChar) || { row: 1, col: 0 };
                    return la.row - lb.row || la.col - lb.col;
                });

                sortedNotes.forEach(note => {
                    const layout = keyboardLayouts.get(note.keyChar) || { row: 1, col: 0 };
                    noteQueue.push({
                        keyChar: note.keyChar,
                        noteName: note.noteName,
                        durationMs: note.durationMs,
                        timeMs: note.timeMs,
                        spawnTimeMs: Math.max(0, note.timeMs - fallDurationMs),
                        row: layout.row,
                        col: layout.col,
                        element: null,
                        hit: false,
                        missed: false,
                        spawnedAt: null,
                        y: null,
                        locked: false,
                    });
                });
            });

            nextNoteIndex = 0;
            activeNotes = [];
        }

        function spawnNote(note, nowMs) {
            const noteEl = document.createElement('div');
            noteEl.className = 'note';
            noteEl.textContent = note.keyChar;

            const spec = rowSpecs[note.row] || rowSpecs[1];
            note.x = spec.start + note.col * spec.step;
            note.y = startY;
            note.spawnedAt = nowMs;
            note.element = noteEl;

            noteEl.style.left = `${note.x}px`;
            noteEl.style.top = `${note.y}px`;
            noteEl.style.zIndex = String(20 - note.row);
            noteEl.style.transform = 'translate(-50%, -50%)';

            sheet.appendChild(noteEl);
            activeNotes.push(note);
        }

        function spawnDueNotes(currentTimeMs) {
            while (nextNoteIndex < noteQueue.length && noteQueue[nextNoteIndex].spawnTimeMs <= currentTimeMs) {
                spawnNote(noteQueue[nextNoteIndex], currentTimeMs);
                nextNoteIndex++;
            }
        }

        function renderPlaybackFrame(currentTimeMs) {
            spawnDueNotes(currentTimeMs);

            activeNotes.forEach(note => {
                if (!note.element || note.hit || note.missed) return;

                const targetY = getJudgmentY();
                const travel = Math.min(1, Math.max(0, (currentTimeMs - note.spawnTimeMs) / fallDurationMs));
                const rawY = startY + ((targetY - startY) * travel);
                const y = rawY >= targetY - snapDistancePx ? targetY : rawY;
                note.y = y;
                note.element.style.top = `${y}px`;

                if (y >= targetY && !note.locked) {
                    note.locked = true;
                    setTimeout(() => {
                        if (!note.hit && note.element) {
                            pausePlayback();
                            showFeedback('miss');
                        }
                    }, judgeHoldMs);
                }
            });
        }

        function triggerNote(note) {
            synth.triggerAttackRelease(note.noteName, Math.max(0.12, note.durationMs / 1000));
            note.hit = true;
            if (note.element) {
                note.element.classList.add('hit');
                setTimeout(() => {
                    note.element.remove();
                }, 140);
            }

            clearTimeout(judgeFlashTimer);
            cursor.classList.add('flash');
            judgeFlashTimer = setTimeout(() => {
                cursor.classList.remove('flash');
            }, 120);
        }

        function showFeedback(message) {
            clearTimeout(feedbackTimer);
            status.textContent = message;
            feedbackTimer = setTimeout(() => {
                if (currentMidi) {
                    status.textContent = isPaused
                        ? '일시정지 | 키 입력으로 재개'
                        : `재생 중... 속도 x${visualSpeed.toFixed(1)} | 1: 느리게 2: 빠르게 | 키를 눌러 판정`;
                }
            }, 350);
        }

        function getCurrentTimeMs() {
            return performance.now() - playStartAt - pausedMs;
        }

        function pausePlayback() {
            if (!isPlaying || isPaused) return;
            isPaused = true;
            pauseStartedAt = performance.now();
            if (animationId) cancelAnimationFrame(animationId);
            animationId = null;
        }

        function resumePlayback() {
            if (!isPlaying || !isPaused) return;
            pausedMs += performance.now() - pauseStartedAt;
            isPaused = false;
            animationId = requestAnimationFrame(updatePlayback);
        }

        function judgeNote(key) {
            if (!isPlaying) return;

            const candidates = activeNotes.filter(note => !note.hit && !note.missed && note.keyChar === key);
            let bestNote = null;
            let bestDistance = Infinity;

            candidates.forEach(note => {
                const currentY = note.y ?? startY;
                const distance = Math.abs(currentY - getJudgmentY());
                if (distance < bestDistance) {
                    bestNote = note;
                    bestDistance = distance;
                }
            });

            if (bestNote && bestDistance <= judgeTolerancePx) {
                triggerNote(bestNote);
                activeNotes = activeNotes.filter(note => note !== bestNote);
                showFeedback('PERPECT!!');
                return;
            }

            if (bestNote) {
                pausePlayback();
                showFeedback('miss');
                return;
            }

            if (activeNotes.length > 0) {
                pausePlayback();
            }
            showFeedback('miss');
        }

        function stopPlayback() {
            if (animationId) cancelAnimationFrame(animationId);
            animationId = null;
            isPlaying = false;
            isPaused = false;
            nextNoteIndex = 0;
            activeNotes = [];
            pausedMs = 0;
            pauseStartedAt = 0;
            clearTimeout(feedbackTimer);
            playBtn.disabled = !currentMidi;
            stopBtn.disabled = true;
        }

        function updatePlayback() {
            if (!isPlaying || isPaused) return;

            cursor.style.display = 'block';

            renderPlaybackFrame(getCurrentTimeMs());

            if (nextNoteIndex >= noteQueue.length && activeNotes.length === 0) {
                stopPlayback();
                status.textContent = '재생 완료';
                return;
            }

            animationId = requestAnimationFrame(updatePlayback);
        }

        async function startPlayback() {
            if (!currentMidi || noteQueue.length === 0) return;

            await Tone.start();
            stopPlayback();

            isPlaying = true;
            isPaused = false;
            nextNoteIndex = 0;
            activeNotes = [];
            pausedMs = 0;
            pauseStartedAt = 0;
            playStartAt = performance.now();
            playBtn.disabled = true;
            stopBtn.disabled = false;
            status.textContent = `재생 중... 속도 x${visualSpeed.toFixed(1)} | 1: 느리게 2: 빠르게 | 키를 눌러 판정`;

            updatePlayback();
        }

        fileInput.addEventListener('change', async e => {
            const file = e.target.files[0];
            if (!file) return;

            await loadMidiArrayBuffer(await file.arrayBuffer(), file.name);
        });

        loadProjectBtn.addEventListener('click', async () => {
            try {
                await loadProjectMidi(projectMidiSelect.value);
            } catch (error) {
                status.textContent = `불러오기 실패: ${error.message}`;
            }
        });

        playBtn.addEventListener('click', startPlayback);
        stopBtn.addEventListener('click', () => {
            stopPlayback();
            status.textContent = '정지됨';
        });

        window.addEventListener('keydown', e => {
            if (e.target && ['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

            const key = e.key;

            if (key === '1') {
                visualSpeed = Math.max(visualSpeedMin, +(visualSpeed - visualSpeedStep).toFixed(1));
                status.textContent = `속도 x${visualSpeed.toFixed(1)} | 1: 느리게 2: 빠르게`;
                return;
            }

            if (key === '2') {
                visualSpeed = Math.min(visualSpeedMax, +(visualSpeed + visualSpeedStep).toFixed(1));
                status.textContent = `속도 x${visualSpeed.toFixed(1)} | 1: 느리게 2: 빠르게`;
                return;
            }

            if (!isPlaying) return;

            if (isPaused) {
                resumePlayback();
                renderPlaybackFrame(getCurrentTimeMs());
                if (activeNotes.length === 0) return;
            }

            void Tone.start();
            judgeNote(key);
        });
    </script>
</body>

</html>
