<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>MIDI Sheet Cursor Player</title>
    <script src="https://unpkg.com/tone"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        :root {
            --bg: #f5f5f5;
            --text: #111;
            --panel: #fff;
            --border: #222;
            --note-border: #333;
            --note-hit: #d5ffd7;
            --note-hit-border: #148a2b;
            --cursor: red;
            --sheet-width: 400px;
            --sheet-height: 640px;
            --inner-width: 320px;
            --row-height: 140px;
            --line-color: rgba(0, 0, 0, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: sans-serif;
            text-align: center;
            color: var(--text);
            background: var(--bg);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        button,
        input {
            padding: 8px 12px;
            font-size: 14px;
        }

        #status {
            min-height: 20px;
            margin: 10px 0 16px;
            font-size: 14px;
        }

        #sheetWrap {
            width: var(--sheet-width);
            height: var(--sheet-height);
            margin: 0 auto;
            overflow: auto;
            position: relative;
            background: var(--panel);
            border: 1px solid #ddd;
        }

        #sheet {
            width: var(--inner-width);
            min-height: var(--sheet-height);
            margin: 0 auto;
            position: relative;
        }

        .note {
            position: absolute;
            min-width: 32px;
            padding: 5px 10px;
            color: #000;
            background: #fff;
            font-size: 15px;
            line-height: 32px;
            text-align: center;
            white-space: nowrap;
            user-select: none;
            transform: translate(-50%, -50%);
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .note.hit {
            background: var(--note-hit);
            border-color: var(--note-hit-border);
        }

        #cursor {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            display: none;
            width: 3px;
            height: 240px;
            background: linear-gradient(to bottom, rgba(255, 0, 0, 0.15), var(--cursor), rgba(255, 0, 0, 0.15));
            transform: translate3d(0, 0, 0);
            transform-origin: center top;
            pointer-events: none;
            will-change: transform;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.35);
        }

        .sheetTextWrap {
            width: 720px;
            max-width: 100%;
            margin: 24px auto 0;
            text-align: left;
        }

        .sheetTextHead {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .sheetTextHead h2 {
            margin: 0;
            font-size: 18px;
        }

        #sheetText {
            width: 100%;
            min-height: 220px;
            resize: vertical;
            padding: 12px;
            font-size: 15px;
            line-height: 1.6;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #fff;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h1>🎹 MIDI Cursor Player</h1>

    <div class="controls">
        <input type="file" id="fileInput" accept=".mid,.midi" />
        <button id="playBtn" disabled>▶ 재생</button>
        <button id="stopBtn" disabled>■ 정지</button>
        <button id="copyBtn" disabled>📋 악보 복사</button>
    </div>

    <div id="status">MIDI 파일을 선택하세요.</div>

    <div id="sheetWrap">
        <div id="sheet">
            <div id="cursor"></div>
        </div>
    </div>

    <div class="sheetTextWrap">
        <div class="sheetTextHead">
            <h2>복사용 악보</h2>
        </div>
        <textarea id="sheetText" readonly placeholder="MIDI를 불러오면 여기에 복사 가능한 악보가 생성됩니다."></textarea>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const copyBtn = document.getElementById('copyBtn');
        const status = document.getElementById('status');
        const sheet = document.getElementById('sheet');
        const sheetWrap = document.getElementById('sheetWrap');
        const cursor = document.getElementById('cursor');
        const sheetText = document.getElementById('sheetText');

        const lineWidth = 320;
        const rowHeight = 240;
        const stackHeight = 32;
        const maxStack = 6;
        const groupGapMs = 30;
        const pixelsPerMs = 0.18;

        let currentMidi = null;
        let noteGroups = [];
        let animationId = null;
        let playStartAt = 0;
        let isPlaying = false;
        let nextGroupIndex = 0;
        let cursorVisualX = 0;
        let cursorVisualY = 0;
        let scrollVisualY = 0;

        let synth = null;

        function initSampler() {
            synth = new Tone.Sampler({
                urls: {
                    "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
                    "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
                    "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
                    "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
                    "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
                    "A5": "A5.mp3", "C6": "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3",
                    "A6": "A6.mp3", "C7": "C7.mp3", "D#7": "Ds7.mp3", "F#7": "Fs7.mp3",
                    "A7": "A7.mp3", "C8": "C8.mp3"
                },
                release: 4,
                baseUrl: "https://tonejs.github.io/audio/salamander/",
                onload: () => {
                    status.textContent = "✅ 샘플 로딩 완료! MIDI 파일을 선택하세요.";
                }
            }).toDestination();
        }
        initSampler();

        function setKeyMap() {
            const keyMap = new Map();
            const keyArray = [
                '1', '!', '2', '@', '3', '4', '$', '5', '%', '6', '^',
                '7', '8', '*', '9', '(', '0',
                'q', 'Q', 'w', 'W', 'e', 'E', 'r', 't', 'T', 'y', 'Y',
                'u', 'i', 'I', 'o', 'O', 'p', 'P',
                'a', 's', 'S', 'd', 'D', 'f', 'g', 'G', 'h', 'H',
                'j', 'J', 'k', 'l', 'L',
                'z', 'Z', 'x', 'c', 'C', 'v', 'V', 'b', 'B', 'n', 'm', 'M'
            ];

            for (let i = 0; i < keyArray.length; i++) {
                keyMap.set(i + 36, keyArray[i]);
            }
            return keyMap;
        }

        const keyMap = setKeyMap();

        function getLastTimeMs(midi) {
            let maxTime = 0;
            midi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    const endTime = (note.time + note.duration) * 1000;
                    if (endTime > maxTime) maxTime = endTime;
                });
            });
            return maxTime;
        }

        function collectNotes(midi) {
            const allNotes = [];

            midi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    const keyChar = keyMap.get(note.midi);
                    if (!keyChar) return;

                    allNotes.push({
                        midi: note.midi,
                        keyChar,
                        timeMs: note.time * 1000,
                        durationMs: note.duration * 1000,
                        noteName: note.name
                    });
                });
            });

            allNotes.sort((a, b) => a.timeMs - b.timeMs);
            return allNotes;
        }

        function groupNotesBy30ms(allNotes) {
            if (allNotes.length === 0) return [];

            const groups = [];
            let currentGroup = [allNotes[0]];
            let groupStartTime = allNotes[0].timeMs;

            for (let i = 1; i < allNotes.length; i++) {
                const note = allNotes[i];

                if (note.timeMs - groupStartTime <= groupGapMs) {
                    currentGroup.push(note);
                } else {
                    groups.push({ timeMs: currentGroup[0].timeMs, notes: currentGroup });
                    currentGroup = [note];
                    groupStartTime = note.timeMs;
                }
            }

            groups.push({ timeMs: currentGroup[0].timeMs, notes: currentGroup });
            return groups;
        }

        function clearSheet() {
            sheet.querySelectorAll('.note').forEach(el => el.remove());
            cursor.style.display = 'none';
            sheet.style.height = '640px';
        }

        function createNote(char, scaledTime, stackIndex) {
            const noteEl = document.createElement('div');
            noteEl.className = 'note';
            noteEl.textContent = char;

            const x = scaledTime % lineWidth;
            const row = Math.floor(scaledTime / lineWidth);

            const baseY = row * rowHeight + 110;
            const y = baseY - stackIndex * stackHeight;

            noteEl.style.left = `${x + 10}px`;
            noteEl.style.top = `${y}px`;

            sheet.appendChild(noteEl);
            return { element: noteEl, x: x + 10, y, row };
        }

        function renderGroups(groups) {
            clearSheet();

            let maxRow = 0;

            groups.forEach(group => {
                const scaledTime = group.timeMs * pixelsPerMs;

                group.notes.forEach((note, index) => {
                    const stackIndex = Math.min(index, maxStack - 1);
                    const rendered = createNote(note.keyChar, scaledTime, stackIndex);
                    note.element = rendered.element;
                    note.x = rendered.x;
                    note.y = rendered.y;
                    note.row = rendered.row;
                    maxRow = Math.max(maxRow, rendered.row);
                });
            });

            sheet.style.height = `${Math.max(640, (maxRow + 2) * rowHeight)}px`;
        }

        function buildCopyableSheet(groups) {
            if (!groups.length) return '';

            const lines = [];
            let currentLine = [];

            groups.forEach(group => {
                const chars = group.notes.map(n => n.keyChar).filter(Boolean);

                if (!chars.length) return;

                let token = '';
                if (chars.length === 1) {
                    token = chars[0];
                } else {
                    token = `[${chars.join('')}]`;
                }

                currentLine.push(token);

                if (currentLine.length >= 16) {
                    lines.push(currentLine.join(' '));
                    currentLine = [];
                }
            });

            if (currentLine.length) {
                lines.push(currentLine.join(' '));
            }

            return lines.join('\n');
        }

        function updateSheetText() {
            const text = buildCopyableSheet(noteGroups);
            sheetText.value = text;
            copyBtn.disabled = !text.trim();
        }

        function getCursorPosition(elapsedMs) {
            const scaledTime = elapsedMs * pixelsPerMs;
            const x = scaledTime % lineWidth;
            const row = Math.floor(scaledTime / lineWidth);
            const y = row * rowHeight + 20;
            return { x: x + 10, y, row };
        }

        function playGroup(group) {
            const noteNames = group.notes.map(n => n.noteName);
            const longest = Math.max(...group.notes.map(n => Math.max(120, n.durationMs)));
            synth.triggerAttackRelease(noteNames, longest / 1000);

            group.notes.forEach(note => {
                if (note.element) {
                    note.element.classList.add('hit');
                    setTimeout(() => {
                        note.element.classList.remove('hit');
                    }, 180);
                }
            });
        }

        function stopPlayback() {
            if (animationId) cancelAnimationFrame(animationId);
            animationId = null;
            isPlaying = false;
            nextGroupIndex = 0;
            cursor.style.display = 'none';
            playBtn.disabled = !currentMidi;
            stopBtn.disabled = true;
        }

        function updatePlayback() {
            if (!isPlaying) return;

            const elapsedMs = performance.now() - playStartAt;
            const cursorPos = getCursorPosition(elapsedMs);

            cursor.style.display = 'block';

            const smoothing = 0.28;
            cursorVisualX += (cursorPos.x - cursorVisualX) * smoothing;
            cursorVisualY += (cursorPos.y - cursorVisualY) * smoothing;
            cursor.style.transform = `translate3d(${cursorVisualX}px, ${cursorVisualY}px, 0)`;

            const targetScrollTop = Math.max(0, cursorPos.y - sheetWrap.clientHeight / 2);
            scrollVisualY += (targetScrollTop - scrollVisualY) * 0.18;
            sheetWrap.scrollTop = scrollVisualY;

            while (nextGroupIndex < noteGroups.length && elapsedMs >= noteGroups[nextGroupIndex].timeMs) {
                playGroup(noteGroups[nextGroupIndex]);
                nextGroupIndex++;
            }

            const lastTimeMs = getLastTimeMs(currentMidi);
            if (elapsedMs >= lastTimeMs + 500) {
                stopPlayback();
                status.textContent = '재생 완료';
                return;
            }

            animationId = requestAnimationFrame(updatePlayback);
        }

        async function startPlayback() {
            if (!currentMidi || noteGroups.length === 0) return;

            await Tone.start();
            stopPlayback();

            isPlaying = true;
            nextGroupIndex = 0;
            playStartAt = performance.now();
            playBtn.disabled = true;
            stopBtn.disabled = false;
            status.textContent = '재생 중... 커서가 닿는 노트를 동시에 재생합니다.';

            const startPos = getCursorPosition(0);
            cursorVisualX = startPos.x;
            cursorVisualY = startPos.y;
            scrollVisualY = 0;
            cursor.style.transform = `translate3d(${cursorVisualX}px, ${cursorVisualY}px, 0)`;

            updatePlayback();
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            stopPlayback();
            status.textContent = 'MIDI 로딩 중...';

            const arrayBuffer = await file.arrayBuffer();
            currentMidi = new Midi(arrayBuffer);

            const allNotes = collectNotes(currentMidi);
            noteGroups = groupNotesBy30ms(allNotes);
            renderGroups(noteGroups);
            updateSheetText();

            playBtn.disabled = noteGroups.length === 0;
            stopBtn.disabled = true;

            const sec = (getLastTimeMs(currentMidi) / 1000).toFixed(2);
            status.textContent = `로딩 완료 | 그룹 ${noteGroups.length}개 | 길이 ${sec}초`;
        });

        playBtn.addEventListener('click', startPlayback);

        stopBtn.addEventListener('click', () => {
            stopPlayback();
            status.textContent = '정지됨';
        });

        copyBtn.addEventListener('click', async () => {
            const text = sheetText.value;
            if (!text.trim()) return;

            try {
                await navigator.clipboard.writeText(text);
                status.textContent = '악보가 클립보드에 복사되었습니다.';
            } catch (e) {
                sheetText.focus();
                sheetText.select();
                status.textContent = '자동 복사가 막혀서 텍스트를 선택했습니다. Ctrl+C로 복사하세요.';
            }
        });
    </script>
</body>

</html>
